name: "\U0001F4A1 功能建议"
description: "提出一个新功能或改进建议"
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        感谢你的建议！请描述你希望添加或改进的功能。

  - type: textarea
    id: problem
    attributes:
      label: 问题背景
      description: "你遇到了什么问题，或者当前有什么不便之处？"
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: 期望方案
      description: "你希望如何解决这个问题？描述你理想中的功能表现"
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 替代方案
      description: "你是否考虑过其他替代方案？"

  - type: textarea
    id: extra
    attributes:
      label: 补充信息
      description: "其他可能有帮助的信息（截图、示例配置、参考链接等）"
