name: "\U0001F41B Bug Report"
description: "Report a bug or unexpected behavior"
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill in as much detail as possible so we can investigate quickly.

  - type: input
    id: version
    attributes:
      label: Plugin Version
      description: "The version of Monoceros you are using"
      placeholder: "e.g. 1.0.0"
    validations:
      required: true

  - type: input
    id: server
    attributes:
      label: Server Info
      description: "Server software and Minecraft version"
      placeholder: "e.g. Paper 1.20.4"
    validations:
      required: true

  - type: input
    id: java
    attributes:
      label: Java Version
      placeholder: "e.g. Java 17"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: "A clear and concise description of the bug"
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to Reproduce
      description: "How can we reproduce this issue?"
      value: |
        1. 
        2. 
        3. 
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: "What did you expect to happen?"
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / Error Output
      description: "Paste any relevant console logs or stack traces"
      render: text

  - type: textarea
    id: extra
    attributes:
      label: Additional Context
      description: "Any other information that might help (screenshots, config files, other plugins installed, etc.)"
