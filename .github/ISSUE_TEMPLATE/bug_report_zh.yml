name: "\U0001F41B Bug 反馈"
description: "报告一个 Bug 或异常行为"
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        感谢你花时间提交 Bug 反馈！请尽量填写完整信息，以便我们快速定位问题。

  - type: input
    id: version
    attributes:
      label: 插件版本
      description: "你使用的 Monoceros 版本号"
      placeholder: "例如: 1.0.0"
    validations:
      required: true

  - type: input
    id: server
    attributes:
      label: 服务端信息
      description: "服务端类型与 Minecraft 版本"
      placeholder: "例如: Paper 1.20.4"
    validations:
      required: true

  - type: input
    id: java
    attributes:
      label: Java 版本
      placeholder: "例如: Java 17"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Bug 描述
      description: "清晰简洁地描述你遇到的问题"
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: 复现步骤
      description: "如何复现这个问题？"
      value: |
        1. 
        2. 
        3. 
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: 期望行为
      description: "你期望发生什么？"
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: 日志 / 报错信息
      description: "粘贴相关的控制台日志或报错堆栈"
      render: text

  - type: textarea
    id: extra
    attributes:
      label: 补充信息
      description: "其他可能有帮助的信息（截图、配置文件、已安装的其他插件等）"
